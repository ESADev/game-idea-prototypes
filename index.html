<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tactical Bowling Prototype</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>Tactical Bowling</h1>
        <p>Turn-based bowling defense prototype.</p>
        <div id="status"></div>
        <div class="control-group">
          <label>Start Column: <span id="startValue"></span></label>
          <input id="startColumn" type="range" min="0" max="6" value="3" />
        </div>
        <div class="control-group">
          <label>Angle: <span id="angleValue"></span>°</label>
          <input id="angle" type="range" min="-70" max="70" value="0" />
        </div>
        <div class="control-group">
          <label for="ballType">Ball Type</label>
          <select id="ballType">
            <option value="normal">Normal (∞)</option>
            <option value="heavy">Heavy</option>
            <option value="bomb">Bomb</option>
          </select>
        </div>
        <button id="throwBtn">Throw</button>
        <button id="newRunBtn">Start New Run</button>

        <h2>Shop (Between Runs)</h2>
        <div id="shop"></div>
        <small>Prices rise each purchase.</small>
      </section>

      <section class="game-area">
        <canvas id="game" width="560" height="840"></canvas>
      </section>
    </main>
    <script type="module" src="/main.js"></script>
  </body>
</html>
